name: Build Steam Launcher IPA
on: workflow_dispatch
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Inject Steam & UI
        run: |
          # Creates the folder for your Steam credentials
          mkdir -p ./Resources/SteamData
          # Downloads the lightweight Steam command-line tool
          curl -sqL "https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz" | tar zxvf - -C ./Resources/SteamData
      - name: Compile Native IPA
        run: |
          xcodebuild -project UTM.xcodeproj -scheme "UTM iOS" -configuration Release -sdk iphoneos archive -archivePath ./UTM.xcarchive
          xcodebuild -exportArchive -archivePath ./UTM.xcarchive -exportOptionsPlist ./ExportOptions.plist -exportPath ./build
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Steam-Launcher-IPA
          path: ./build/*.ipa
