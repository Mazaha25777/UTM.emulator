# ==========================================
# SCRIPT 1: THE CLOUD BUILD (GITHUB ACTIONS)
# ==========================================
# FILE PATH: .github/workflows/build.yml
# ==========================================
name: Build Optimized UTM
on: workflow_dispatch
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'
      - name: Build IPA
        run: |
          # Optimization for M1 and A14/A16
          xcodebuild -project UTM.xcodeproj -scheme "UTM iOS" -configuration Release -sdk iphoneos archive -archivePath ./UTM.xcarchive
          xcodebuild -exportArchive -archivePath ./UTM.xcarchive -exportOptionsPlist ./ExportOptions.plist -exportPath ./build
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: UTM-Optimized
          path: ./build/*.ipa
