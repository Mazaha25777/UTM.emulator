name: Build Steam Launcher IPA
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive  # UTM needs its submodules to build correctly

      - name: Inject SteamCMD
        run: |
          mkdir -p ./Platform/iOS/Resources/SteamData
          curl -sqL "https://steamcdn-a.akamaihd.net/client/installer/steamcmd_osx.tar.gz" | tar zxvf - -C ./Platform/iOS/Resources/SteamData
          chmod +x ./Platform/iOS/Resources/SteamData/steamcmd.sh

      - name: List Available Schemes
        run: xcodebuild -project UTM.xcodeproj -list

      - name: Build Raw App Binary
        run: |
          # This command builds the app as a "Development" version, which 
          # doesn't require the strict certificates that cause Error 65.
          xcodebuild build \
            -project UTM.xcodeproj \
            -scheme "UTM" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            BITCODE_GENERATION_MODE=bitcode

      - name: Package for Sideloadly
        run: |
          # Locate the built .app and put it in a Payload folder
          mkdir -p ./Payload
          APP_PATH=$(find ./DerivedData -name "UTM.app" -type d | head -n 1)
          cp -r "$APP_PATH" ./Payload/
          
          # Create the final IPA
          zip -r SteamLauncher.ipa Payload

      - name: Upload Finished Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Steam-Launcher-Final
          path: SteamLauncher.ipa
